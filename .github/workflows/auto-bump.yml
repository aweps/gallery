    # Monthly, staggered per app: minute/hour/day-of-month derived from the
    # app name at render time so mono siblings don't all bump at once (and
    # off-the-hour minutes dodge GitHub's top-of-hour scheduler congestion).
    - cron: "21 9 10 * *"
